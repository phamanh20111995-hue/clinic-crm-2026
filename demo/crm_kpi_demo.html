<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CRM — KPI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Be Vietnam Pro',sans-serif;font-size:13px;background:#eef1f6;color:#1a2233}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:58px;background:#0f2044;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:2px;flex-shrink:0}
.sb-logo{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;transition:background .2s}
.sbi{width:46px;height:46px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#5a7fa8;cursor:pointer;gap:2px;transition:all .14s}
.sbi.on{color:#fff}
.sbi.off{opacity:.2;cursor:not-allowed}
.sbi i{font-size:18px}.sbi span{font-size:9px;font-weight:500}
.sb-sp{flex:1}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Topbar */
.tb{background:#fff;border-bottom:1px solid #dde3ef;padding:0 12px;height:48px;display:flex;align-items:center;gap:7px;flex-shrink:0;overflow-x:auto}
.tb::-webkit-scrollbar{display:none}
.tb-title{font-size:13px;font-weight:700;color:#0f2044;display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.tb-sep{width:1px;height:18px;background:#dde3ef;margin:0 3px;flex-shrink:0}

/* Role switcher */
.rb-group{display:flex;gap:3px;flex-shrink:0}
.rb{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:500;cursor:pointer;border:1.5px solid #dde3ef;font-family:inherit;color:#64748b;background:#f8fafc;transition:all .12s;white-space:nowrap;display:flex;align-items:center;gap:4px}
.rb i{font-size:11px}
.rb:hover{border-color:currentColor}
.rb.on{font-weight:700;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.tb-month{margin-left:auto;flex-shrink:0;font-size:11px;color:#94a3b8;background:#f1f5f9;border-radius:6px;padding:3px 9px}

/* Subnav */
.subnav{background:#fff;border-bottom:1px solid #dde3ef;padding:0 14px;display:flex;align-items:center;height:40px;flex-shrink:0;overflow-x:auto}
.subnav::-webkit-scrollbar{display:none}
.sntab{padding:0 11px;height:40px;display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;border:none;background:none;flex-shrink:0;font-family:inherit;transition:color .12s}
.sntab:hover{color:#374151}
.sntab.on{font-weight:600;border-bottom-width:2px;border-bottom-style:solid}
.sntab i{font-size:13px}
.sn-right{margin-left:auto;flex-shrink:0}

/* Screens */
.sc{display:none;flex:1;flex-direction:column;overflow:hidden}
.sc.on{display:flex}
.cnt{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}

/* Cards */
.card{background:#fff;border:1px solid #dde3ef;border-radius:10px;overflow:hidden}
.card-hd{padding:9px 14px;border-bottom:1px solid #eef1f6;display:flex;align-items:center;justify-content:space-between;background:#f8fafc;flex-shrink:0}
.card-hd-l{font-size:12px;font-weight:600;color:#0f2044;display:flex;align-items:center;gap:6px}

/* KPI cards */
.kpi-card{background:#fff;border:1px solid #dde3ef;border-radius:10px;padding:13px 14px;transition:box-shadow .14s}
.kpi-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.07)}
.kpi-card .lbl{font-size:10px;color:#94a3b8;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.kpi-card .val{font-size:22px;font-weight:700;line-height:1.1}
.kpi-card .sub{font-size:10px;color:#94a3b8;margin-top:3px}
.prog{height:6px;background:#f1f5f9;border-radius:10px;overflow:hidden;margin-top:7px}
.prog-f{height:100%;border-radius:10px}

/* Grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* Badges */
.bdg{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:600;white-space:nowrap}
.b-ok{background:#dcfce7;color:#15803d}
.b-warn{background:#fef9c3;color:#854d0e}
.b-err{background:#fee2e2;color:#991b1b}
.b-blue{background:#dbeafe;color:#1e40af}
.b-purple{background:#ede9fe;color:#5b21b6}
.b-gray{background:#f1f5f9;color:#475569}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl thead th{background:#f8fafc;padding:7px 12px;text-align:left;font-size:10px;font-weight:600;color:#64748b;border-bottom:1px solid #eef1f6;white-space:nowrap}
.tbl thead th.r{text-align:right}
.tbl tbody td{padding:8px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.tbl tbody td.r{text-align:right}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tfoot td{padding:8px 12px;font-weight:700;background:#f8fafc;border-top:2px solid #dde3ef}
.tbl tfoot td.r{text-align:right}

/* Rank row */
.rank-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #f1f5f9}
.rank-row:last-child{border-bottom:none}
.rn{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}

/* Funnel (chỉ Tele) */
.funnel-step{display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid #f1f5f9}
.funnel-step:last-child{border-bottom:none}
.f-label{width:80px;font-size:10px;color:#64748b;flex-shrink:0}
.f-bar-wrap{flex:1;height:22px;background:#f1f5f9;border-radius:6px;overflow:hidden}
.f-bar{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 8px}
.f-txt{font-size:10px;font-weight:600;color:#fff;white-space:nowrap}
.f-pct{width:36px;text-align:right;font-size:10px;font-weight:600;flex-shrink:0}

/* Milestone */
.ms{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;font-size:11px;margin-bottom:5px}
.ms-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Luong box */
.luong-box{border-radius:10px;padding:14px}
.luong-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.15)}
.luong-row:last-child{border-bottom:none}
.luong-main{font-size:15px;font-weight:700;padding-top:10px;margin-top:6px;border-top:1.5px dashed rgba(0,0,0,.1)}

/* Lock banner */
.lock-banner{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:11px;color:#991b1b;display:flex;align-items:center;gap:8px;margin-bottom:10px}

/* Bill card */
.bill-box{background:#f0fdf4;border:1.5px solid #16a34a;border-radius:10px;padding:13px 14px}
.bill-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;color:#374151}
.bill-main{display:flex;justify-content:space-between;font-size:14px;font-weight:700;padding-top:9px;border-top:1.5px dashed #bbf7d0;margin-top:6px}

/* Star rating bars */
.star-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.star-bar{flex:1;height:18px;background:#f1f5f9;border-radius:5px;overflow:hidden}
.star-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding:0 7px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}

/* ════════════════════════════════════
   RESPONSIVE — Mobile first
   Breakpoint: <= 768px = mobile
════════════════════════════════════ */

/* Ẩn sidebar trên mobile, dùng bottom nav */
@media (max-width: 768px) {

  /* Layout chính */
  .app { flex-direction: column; }
  
  .sidebar {
    display: none !important;
  }

  .main {
    padding-bottom: 56px; /* chỗ cho bottom nav */
  }

  /* Topbar */
  .topbar {
    padding: 0 10px;
    height: 50px;
    flex-wrap: nowrap;
    overflow: hidden;
  }
  .topbar .top-appname { font-size: 12px; }
  .topbar .top-sep { display: none; }
  .topbar .top-mod {
    display: none;
  }
  .topbar .top-user .top-uname { display: none; }
  .back-btn span { display: none; }
  .back-btn { padding: 4px 7px; }

  /* Subnav — scroll ngang */
  .subnav, .modnav {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 6px;
    scrollbar-width: none;
  }
  .modnav { height: auto; flex-wrap: nowrap; }
  .mnbtn { font-size: 9px; padding: 5px 7px; }
  .sntab { font-size: 10px; padding: 0 9px; }

  /* Filter bar — scroll ngang */
  .filter-bar, .crm-filter-bar {
    padding: 5px 10px;
    gap: 5px;
    overflow-x: auto;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
  }
  .fi, .crm-fi { height: 30px; font-size: 11px; }
  .fi-search, .crm-fi-search { width: 130px; }

  /* Content area */
  .cnt { padding: 10px; gap: 8px; }

  /* Stat grids — 2 cột trên mobile */
  .stat-row,
  [style*="grid-template-columns:repeat(4"],
  [style*="grid-template-columns:repeat(5"] {
    grid-template-columns: 1fr 1fr !important;
  }
  [style*="grid-template-columns:repeat(3"] {
    grid-template-columns: 1fr 1fr !important;
  }

  /* 2 cột → 1 cột */
  .g2, .g3, .g4 {
    grid-template-columns: 1fr !important;
  }
  [style*="grid-template-columns:1fr 1fr"] {
    grid-template-columns: 1fr !important;
  }

  /* Cards */
  .card { border-radius: 8px; }
  .card-hd { padding: 8px 11px; }
  .card-hd-l { font-size: 11px; }

  /* Table — scroll ngang */
  .card > table,
  .card > div > table,
  .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tbl { font-size: 10px; min-width: 500px; }
  .tbl thead th, .tbl tbody td { padding: 6px 8px; }

  /* Two-col layout → 1 cột */
  .two-col {
    grid-template-columns: 1fr !important;
    overflow-y: auto;
    grid-template-rows: auto auto;
  }

  /* Data rows */
  .data-row { padding: 8px 10px; gap: 8px; }
  .data-row .av { width: 30px; height: 30px; font-size: 9px; }

  /* Modal — full screen trên mobile */
  .modal-bg { align-items: flex-end; }
  .modal, .modal-wide {
    width: 100% !important;
    max-width: 100% !important;
    border-radius: 14px 14px 0 0 !important;
    max-height: 92vh;
    padding: 16px;
  }

  /* Stat vals */
  .stat .val { font-size: 18px; }
  .stat { padding: 9px 11px; }

  /* Buttons */
  .btn { padding: 5px 10px; font-size: 10px; }
  .btn-p, .btn-g, .btn-r { padding: 6px 12px; }

  /* KQ modal lần gọi chips */
  #lan-wrap { gap: 4px; }
  .lan-chip { padding: 3px 8px; font-size: 9px; }

  /* Chat */
  .chat-right { display: none !important; }
  .chat-left { width: 240px; }

  /* BS Mobile đã responsive sẵn */
}

/* ── BOTTOM NAV (chỉ mobile) ── */
@media (max-width: 768px) {
  .bottom-nav {
    display: flex !important;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 56px;
    background: #0f2044;
    border-top: 1px solid rgba(255,255,255,.1);
    z-index: 100;
    align-items: center;
    justify-content: space-around;
    padding: 0 4px;
  }
}
/* Ẩn bottom nav trên desktop */
.bottom-nav { display: none; }

.bn-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 8px;
  color: #5a7fa8;
  border: none;
  background: none;
  font-family: inherit;
  transition: all .12s;
  flex: 1;
}
.bn-item.on { color: #60a5fa; }
.bn-item i { font-size: 20px; }
.bn-item span { font-size: 8px; font-weight: 500; white-space: nowrap; }
.bn-badge {
  position: absolute;
  top: 2px; right: calc(50% - 16px);
  background: #dc2626; color: #fff;
  border-radius: 20px; padding: 0 5px;
  font-size: 8px; font-weight: 700;
}

</style>
</head>
<body>
<div class="app">
<div class="sidebar">
  <div class="sb-logo" id="sb-logo" style="background:#7c3aed"><i class="ti ti-chart-bar" id="sb-ic" style="font-size:19px;color:#fff"></i></div>
  <div class="sbi on" id="sbi-kpi" style="background:#7c3aed;color:#fff"><i class="ti ti-chart-bar"></i><span>KPI</span></div>
  <div class="sbi off"><i class="ti ti-users"></i><span>KH</span></div>
  <div class="sbi off"><i class="ti ti-currency-dong"></i><span>Sale</span></div>
  <div class="sb-sp"></div>
  <div class="sbi"><i class="ti ti-user-circle"></i></div>
</div>

<div class="main">
<!-- TOPBAR với role switcher -->
<div class="tb">
  <div class="tb-title" id="tb-title">
    <i class="ti ti-chart-bar" id="tb-ic" style="color:#7c3aed"></i>
    KPI của tôi
  </div>
  <div class="tb-sep"></div>
  <div class="rb-group">
    <button class="rb on" id="rb-sale" onclick="setRole('sale')" style="color:#15803d;border-color:#15803d">
      <i class="ti ti-currency-dong"></i> S001 Sale
    </button>
    <button class="rb" id="rb-tele" onclick="setRole('tele')" style="color:#0369a1">
      <i class="ti ti-phone"></i> T002 Tele
    </button>
    <button class="rb" id="rb-truc" onclick="setRole('truc')" style="color:#6d28d9">
      <i class="ti ti-database"></i> Trực page
    </button>
    <button class="rb" id="rb-bs" onclick="setRole('bs')" style="color:#991b1b">
      <i class="ti ti-stethoscope"></i> BS KIÊN
    </button>
    <button class="rb" id="rb-ktv" onclick="setRole('ktv')" style="color:#0369a1">
      <i class="ti ti-user-check"></i> KTV Hà
    </button>
    <button class="rb" id="rb-mkt" onclick="setRole('mkt')" style="color:#059669">
      <i class="ti ti-speakerphone"></i> MKT
    </button>
    <button class="rb" id="rb-cskh" onclick="setRole('cskh')" style="color:#be185d">
      <i class="ti ti-heart"></i> CSKH
    </button>
    <button class="rb" id="rb-lead_tele" onclick="setRole('lead_tele')" style="color:#0284c7">
      <i class="ti ti-phone-check"></i> Lead Tele
    </button>
    <button class="rb" id="rb-lead" onclick="setRole('lead')" style="color:#5b21b6">
      <i class="ti ti-crown"></i> Lead Sale
    </button>
    <button class="rb" id="rb-ql" onclick="setRole('ql')" style="color:#dc2626">
      <i class="ti ti-building"></i> Quản lý
    </button>
  </div>
  <div class="tb-month">Tháng 05/2026</div>
</div>

<!-- SUBNAV động -->
<div class="subnav" id="subnav"></div>

<!-- SCREENS container -->
<div id="screens" style="display:flex;flex:1;flex-direction:column;overflow:hidden"></div>

</div><!-- end .main -->
</div><!-- end .app -->

<script>
// ══════════════════════════════════════════════════════════
// CONFIG vai trò — tabs + màu
// ══════════════════════════════════════════════════════════
const CFG = {
  sale: {
    color:'#15803d', ic:'ti-currency-dong',
    title:'KPI · S001 Nguyễn T. Thủy Linh · Sale',
    tabs:[
      {id:'sale-main',  lb:'KPI của tôi',      ic:'ti-user-check'},
      {id:'sale-no',    lb:'Công nợ cần thu',   ic:'ti-clock-dollar'},
      {id:'sale-luong', lb:'Lương ước tính',    ic:'ti-wallet'},
    ]
  },
  tele: {
    color:'#0369a1', ic:'ti-phone',
    title:'KPI · T002 Phạm T. Linh · Tele',
    tabs:[
      {id:'tele-main',  lb:'KPI của tôi',      ic:'ti-user-check'},
      {id:'tele-luong', lb:'Lương ước tính',   ic:'ti-wallet'},
    ]
  },
  truc: {
    color:'#6d28d9', ic:'ti-database',
    title:'KPI · D001 Nguyễn T. Hoa · Trực page',
    tabs:[
      {id:'truc-main', lb:'KPI của tôi', ic:'ti-user-check'},
    ]
  },
  bs: {
    color:'#991b1b', ic:'ti-stethoscope',
    title:'KPI · BS KIÊN · Bác sĩ điều trị',
    tabs:[
      {id:'bs-main', lb:'KPI của tôi', ic:'ti-user-check'},
    ]
  },
  ktv: {
    color:'#0369a1', ic:'ti-user-check',
    title:'KPI · KTV Hà · Kỹ thuật viên',
    tabs:[
      {id:'ktv-main', lb:'KPI của tôi', ic:'ti-user-check'},
    ]
  },
  mkt: {
    color:'#059669', ic:'ti-speakerphone',
    title:'KPI · MKT001 Nguyễn Anh · Marketing',
    tabs:[
      {id:'mkt-content', lb:'KPI Content',    ic:'ti-pencil'},
      {id:'mkt-ads',     lb:'KPI Ads',        ic:'ti-speakerphone'},
    ]
  },
  cskh: {
    color:'#be185d', ic:'ti-heart',
    title:'KPI · CS001 Kiều Anh · CSKH',
    tabs:[
      {id:'cskh-main', lb:'KPI của tôi', ic:'ti-heart'},
    ]
  },
  lead: {
    color:'#5b21b6', ic:'ti-crown',
    title:'KPI · Lead Sale + Team · LS001',
    tabs:[
      {id:'lead-canhan', lb:'KPI cá nhân',  ic:'ti-user-check'},
      {id:'lead-team',   lb:'Team Sale',    ic:'ti-users'},
      {id:'lead-tong',   lb:'Tổng cơ sở',  ic:'ti-building'},
    ]
  },
  lead_tele: {
    color:'#0284c7', ic:'ti-phone-check',
    title:'KPI · Lead Tele + Team · T001 Nguyễn T. Trang',
    tabs:[
      {id:'lt-canhan', lb:'KPI cá nhân',  ic:'ti-user-check'},
      {id:'lt-team',   lb:'Team Tele',    ic:'ti-users'},
      {id:'lt-tong',   lb:'Tổng cơ sở',  ic:'ti-building'},
    ]
  },
  ql: {
    color:'#dc2626', ic:'ti-building',
    title:'KPI Tổng cơ sở — Quản lý / Chủ DN',
    tabs:[
      {id:'ql-co-so',   lb:'Tổng cơ sở',     ic:'ti-building'},
      {id:'ql-sale',    lb:'Team Sale',       ic:'ti-currency-dong'},
      {id:'ql-tele',    lb:'Team Tele',       ic:'ti-phone'},
      {id:'ql-bs-ktv',  lb:'BS / KTV',        ic:'ti-stethoscope'},
      {id:'ql-cskh',    lb:'CSKH',            ic:'ti-heart'},
      {id:'ql-luong',   lb:'Bảng lương',      ic:'ti-wallet'},
    ]
  },
};

let role = 'sale';
let tab  = '';

// ── ROLE SWITCH ──────────────────────────────────────────────
function setRole(r) {
  role = r;
  const c = CFG[r];
  // Buttons
  document.querySelectorAll('.rb').forEach(b => {
    b.classList.remove('on');
    b.style.background = '';
  });
  const btn = document.getElementById('rb-'+r);
  if (btn) { btn.classList.add('on'); btn.style.background = '#fff'; }
  // Sidebar
  const sbLogo = document.getElementById('sb-logo');
  const sbiKpi = document.getElementById('sbi-kpi');
  if (sbLogo) sbLogo.style.background = c.color;
  if (sbiKpi) sbiKpi.style.background = c.color;
  // Topbar
  const tbIc = document.getElementById('tb-ic');
  const tbTitle = document.getElementById('tb-title');
  if (tbIc) { tbIc.style.color = c.color; tbIc.className = 'ti ' + c.ic; }
  if (tbTitle) tbTitle.innerHTML = '<i class="ti ' + c.ic + '" style="color:' + c.color + '"></i> ' + c.title;
  // Build subnav TRƯỚC rồi mới goTab
  buildSubnav(c);
  // Default tab — setTimeout đảm bảo DOM đã render xong
  setTimeout(() => goTab(c.tabs[0].id), 0);
}

function buildSubnav(c) {
  const nav = document.getElementById('subnav');
  if (!nav) return;
  let html = '';
  c.tabs.forEach(function(t) {
    html += '<button class="sntab" id="sntab-' + t.id + '" onclick="goTab(\'' + t.id + '\')">'
          + '<i class="ti ' + t.ic + '"></i> ' + t.lb
          + '</button>';
  });
  html += '<div class="sn-right"><select style="border:1px solid #dde3ef;border-radius:6px;padding:4px 8px;font-size:10px;font-family:inherit;outline:none">'
        + '<option>Tháng 05/2026</option><option>Tháng 04/2026</option>'
        + '</select></div>';
  nav.innerHTML = html;
}

function goTab(id) {
  tab = id;
  const c = CFG[role];
  if (!c) return;
  document.querySelectorAll('.sntab').forEach(b => {
    b.classList.remove('on');
    b.style.color = '';
    b.style.borderBottom = '';
  });
  const t = document.getElementById('sntab-' + id);
  if (t) {
    t.classList.add('on');
    t.style.color = c.color;
    t.style.borderBottom = '2px solid ' + c.color;
  }
  render(id);
}

function render(id) {
  const el = document.getElementById('screens');
  el.style.cssText = 'display:flex;flex:1;flex-direction:column;overflow:hidden';
